name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: bash -n pg

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          format: gcc
        env:
          SHELLCHECK_OPTS: -e SC2059 -e SC2034

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Test help output
        run: |
          chmod +x pg
          ./pg --help | head -20

      - name: Test version command
        run: |
          ./pg version 2>/dev/null || echo "version command check completed"

      - name: Check executable permissions
        run: |
          test -x pg || (echo "pg should be executable" && exit 1)

      - name: Integration test - connect to PostgreSQL
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: testdb
        run: |
          echo "Testing pg tool with PostgreSQL..."
          ./pg ps
          ./pg version
          ./pg conn
          ./pg health 2>/dev/null || echo "health check completed"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t pg-tool:test .

      - name: Test Docker image
        run: |
          docker run --rm pg-tool:test --help | head -20

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check if release needed
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "release=true" >> $GITHUB_OUTPUT
          else
            echo "release=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.check.outputs.release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: pg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
